services:
  logger.channel.webspark_webdir:
    parent: logger.channel_base
    arguments: ['webspark_webdir']
  webspark_webdir.data_potluck_client:
    class: Drupal\webspark_webdir\DataPotluckClient
    arguments:
      - '@http_client_factory'
      - '@logger.channel.webspark_webdir'
      - '@messenger'
  webspark_webdir.webdir_api_url:
    class: Drupal\webspark_webdir\WebdirApiUrl
  webspark_webdir.helper_functions:
    class: Drupal\webspark_webdir\WebsparkWebdirHelpers
  webspark_webdir.remote_profile_fetcher:
    class: Drupal\webspark_webdir\Service\RemoteProfileFetcher
    arguments:
      - '@http_client'
      - '@config.factory'
      - '@cache.default'
      - '@logger.channel.webspark_webdir'
      - '@webspark_webdir.webdir_api_url'
  webspark_webdir.remote_profile_redirect_subscriber:
    class: Drupal\webspark_webdir\EventSubscriber\RemoteProfileRedirectSubscriber
    arguments:
      - '@current_route_match'
    tags:
      - { name: event_subscriber }
