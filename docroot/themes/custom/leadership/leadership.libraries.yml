  css:
    theme:
      assets/css/leadership.style.css: {}
  js:
    src/js/leadership.js: {}
  dependencies:
    - core/once
    - core/drupal
    - core/drupal.ajax

    
leadership.chartjs:
  remote: https://github.com/chartjs/Chart.js
  version: 3.2.0
  license:
    name: MIT
    url: https://github.com/chartjs/Chart.js/blob/master/LICENSE.md
    gpl-compatible: true
  js:
    https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.2.0/chart.min.js: { type: external, minified: true }

animatedhero:
  version: VERSION
  js:
    src/js/animatedhero.js: {}

aos:
  version: 1.0
  css:
