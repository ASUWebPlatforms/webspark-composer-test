svyreport.svyreport:
  path: '/survey-reporting'
  defaults:
    _controller: '\Drupal\svyreport\Controller\SvyReportController::svyreportLoad'
    _title: 'Survey-Reporting'
  requirements:
    _user_is_logged_in: 'TRUE'

svyreport.post:
  path: '/survey-reporting/post'
  defaults:
    _controller: '\Drupal\svyreport\Controller\SvyReportController::svyreportPost'
    _title: 'Survey-Reporting - Report Log'
  methods:  'POST'
  requirements:
    _user_is_logged_in: 'TRUE'
    _format: json

