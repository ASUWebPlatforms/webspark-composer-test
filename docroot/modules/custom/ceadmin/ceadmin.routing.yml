ceadmin.ceadmin:
  path: '/ceadmin'
  defaults:
    _controller: '\Drupal\ceadmin\Controller\CEadminController::ceadminLoad'
    _title: 'Course Evaluation Administration'
  requirements:
    _user_is_logged_in: 'TRUE'

ceadmin.post:
  path: '/ceadmin/php/post'
  defaults:
    _controller: '\Drupal\ceadmin\Controller\CEadminController::ceadminPost'
    _title: 'Course Evaluation Administration - post'
  methods:  'POST'
  requirements:
    _user_is_logged_in: 'TRUE'

ceadmin.sync:
  path: '/ceadmin/php/sync/{dept}/{period}'
  defaults:
    _controller: '\Drupal\ceadmin\Controller\CEadminController::ceadminSync'
    _title: 'Course Evaluation Administration - sync'
  requirements:
    _user_is_logged_in: 'TRUE'

ceadmin.sections:
  path: '/ceadmin/php/sections/{period}'
  defaults:
    _controller: '\Drupal\ceadmin\Controller\CEadminController::ceadminSections'
    _title: 'Course Evaluation Administration - all sections'
  requirements:
    _user_is_logged_in: 'TRUE'

