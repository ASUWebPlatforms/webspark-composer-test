asu_gradapps_api.create_announcement:
  path: '/asu_gradapps_api/announcements'
  defaults:
    _controller: 'Drupal\asu_gradapps_api\Controller\AsuGradappsApiController::createAnnouncement'
  requirements:
    _permission: 'access asu gradapps api endpoints'
  methods: ['POST']
  options:
    _auth: ['basic_auth']
    
