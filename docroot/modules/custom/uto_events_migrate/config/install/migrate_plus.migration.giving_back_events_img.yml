langcode: en
status: true
dependencies:
  enforced:
    module:
      - uto_events_migrate
id: giving_back_events_img
class: null
field_plugin_method: null
cck_plugin_method: null
migration_tags: null
migration_group: giving_back_events
label: 'Giving back Events image file entities'
source:
  urls: 'https://api-na.eventscloud.com/api/v2/global/searchEvents.json?folderid=289253'
  item_selector: null
  ids:
    eventid:
      type: string
  fields:
    -
      name: eventid
      label: 'Event ID'
      selector: eventid
    -
      name: imgsrc
      label: 'Image Source URL'
      selector: imgsrc
  constants:
    image_base_dir: 'public:/'
process:
  settings:
    plugin: skip_on_empty
    method: row
    source: imgsrc
  type:
    plugin: default_value
    default_value: image
  temp_filename:
    plugin: callback
    callable: basename
    source: imgsrc
  temp_image_uri:
    plugin: concat
    source:
      - constants/image_base_dir
      - '@temp_filename'
    delimiter: /
  uri:
    plugin: download
    source:
      - imgsrc
      - '@temp_image_uri'
    rename: true
destination:
  plugin: 'entity:file'
migration_dependencies:
  required: {  }
