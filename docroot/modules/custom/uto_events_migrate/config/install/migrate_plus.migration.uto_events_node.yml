langcode: en
status: true
dependencies:
  enforced:
    module:
      - uto_events_migrate
id: uto_events_node
class: null
field_plugin_method: null
cck_plugin_method: null
migration_tags: null
migration_group: uto_events
label: 'UTO Events'
source:
  urls: 'https://api-na.eventscloud.com/api/v2/global/searchEvents.json?folderid=177088'
  item_selector: null
  ids:
    eventid:
      type: string
  fields:
    -
      name: eventid
      label: 'Event ID'
      selector: eventid
    -
      name: name
      label: Name
      selector: name
    -
      name: description
      label: Description
      selector: description
    -
      name: eventtype
      label: eventtype
      selector: eventtype
    -
      name: locationname
      label: locationname
      selector: locationname
    -
      name: url
      label: url
      selector: url
    -
      name: startdate
      label: startdate
      selector: startdate
    -
      name: starttime
      label: starttime
      selector: starttime
    -
      name: enddate
      label: enddate
      selector: enddate
    -
      name: endtime
      label: endtime
      selector: endtime
process:
  type:
    plugin: default_value
    default_value: uto_event
  status:
    plugin: default_value
    default_value: 1
  title:
    -
      plugin: get
      source: name
  field_event_id:
    -
      plugin: get
      source: eventid
  field_event_description/value:
    -
      plugin: get
      source: description
  field_event_description/format:
    -
      plugin: default_value
      default_value: full_html
  field_event_type:
    -
      plugin: get
      source: eventtype
  field_event_location:
    -
      plugin: get
      source: locationname
  field_event_url/uri:
    -
      plugin: get
      source: url
  start_date_time:
    plugin: concat
    source:
      - startdate
      - starttime
    delimiter: ' '
  end_date_time:
    plugin: concat
    source:
      - enddate
      - endtime
    delimiter: ' '
  field_event_date/value:
    plugin: format_date
    source: '@start_date_time'
    from_format: 'Y-m-d H:i:s'
    to_format: 'Y-m-d\TH:i:s'
    from_timezone: America/Phoenix
    to_timezone: UTC
  field_event_date/end_value:
    plugin: format_date
    source: '@end_date_time'
    from_format: 'Y-m-d H:i:s'
    to_format: 'Y-m-d\TH:i:s'
    from_timezone: America/Phoenix
    to_timezone: UTC
  field_event_image/target_id:
    plugin: migration_lookup
    migration: uto_events_img
    no_stub: true
    source: eventid
  field_event_image/alt:
    plugin: get
    source: name
  uid:
    plugin: default_value
    default_value: 1
  sticky:
    plugin: default_value
    default_value: 0
destination:
  plugin: 'entity:node'
migration_dependencies:
  required:
    - uto_events_img
