id: contact_undergrad_form
title: 'Contact undergrad form'
description: ''
category: ''
elements: |-
  header_text:
    '#type': processed_text
    '#text': |
      <h3>Answer the questions below so that we can connect you with the right representative</h3>
    '#format': full_html
  which_of_these_apply_to_you_:
    '#type': radios
    '#title': 'Which of these apply to you?'
    '#options':
      FTF: 'First-year student'
      TRN: 'Transfer student'
    '#wrapper_type': form_element
    '#wrapper_attributes':
      class:
        - cf-field
    '#required': true
  are_you_applying_to_asu_as_a_:
    '#type': radios
    '#title': 'Are you applying to ASU as a...'
    '#title_display': before
    '#options':
      citizen: 'U.S. citizen or permanent resident'
      international: 'International student with a F-1/J-1 student visa'
      military: 'Military-affiliated and/or veteran student'
      unique-status: 'Student with an unique status -- DACA, undocumented, refugee, other visa types, etc.'
    '#required': true
    '#states':
      visible:
        ':input[name="which_of_these_apply_to_you_"]':
          value: FTF
    '#wrapper_type': form_element
    '#wrapper_attributes':
      class:
        - 'cf-field custom-required'
  do_you_attend_an_u_s_high_school_:
    '#type': radios
    '#title': 'Do you attend an U.S. high school?'
    '#options':
      'yes': 'Yes'
      'no': 'No'
    '#required': true
    '#states':
      visible:
        ':input[name="are_you_applying_to_asu_as_a_"]':
          value:
            pattern: ^(citizen|international)$
    '#wrapper_type': form_element
    '#wrapper_attributes':
      class:
        - 'cf-field custom-required'
  freshman_state:
    '#type': select
    '#title': 'Enter your location below'
    '#options': freshman_states
    '#empty_option': 'Enter state name'
    '#required': true
    '#states':
      visible:
        - ':input[name="do_you_attend_an_u_s_high_school_"]':
            value: 'yes'
        - xor
        - ':input[name="are_you_applying_to_asu_as_a_"]':
            value: unique-status
    '#wrapper_attributes':
      class:
        - custom-required
  high_school_autocomplete:
    '#type': webform_autocomplete
    '#title': 'Most recent school you''ve attended or currently attending'
    '#required': true
    '#states':
      visible:
        ':input[name="freshman_state"]':
          value: Arizona
    '#wrapper_attributes':
      class:
        - custom-required
    '#autocomplete_items': hs_autocomplete_options
    '#autocomplete_match_operator': STARTS_WITH
  domestic_hs_rep_info:
    '#type': processed_text
    '#wrapper_attributes':
      class:
        - 'cf-field card-body'
    '#format': full_html
  military_rep_info:
