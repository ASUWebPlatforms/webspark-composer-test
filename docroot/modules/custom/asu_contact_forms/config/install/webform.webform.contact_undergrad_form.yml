    '#title': 'Undergrad form'
    '#title_display': invisible
    '#attributes':
      class:
        - 'pt-2 pr-5'
    what_s_your_question_:
      '#type': textarea
      '#title': 'Your message'
      '#title_display': before
      '#maxlength': 255
      '#required': true
      '#counter_type': character
      '#counter_maximum': 255
    first_name:
      '#type': textfield
      '#title': 'First name'
      '#title_display': before
      '#required': true
    last_name:
      '#type': textfield
      '#title': 'Last name'
      '#title_display': before
      '#required': true
    email:
      '#type': email
      '#title': Email
      '#title_display': before
      '#required': true
    phone:
      '#type': tel
      '#title': Phone
      '#title_display': before
      '#international': true
      '#international_initial_country': US
    select_country:
      '#type': select
      '#title': Country
      '#title_display': before
      '#options': country_codes
      '#required': true
      '#states':
        visible:
          - ':input[name="do_you_attend_an_u_s_high_school_"]':
              value: 'no'
          - xor
          - ':input[name="transfer_do_you_attend_a_u_s_institution_"]':
              value: 'no'
      '#wrapper_attributes':
        class:
          - custom-required
    planned_enrollment_term:
      '#type': select
      '#title': 'Planned enrollment term'
      '#title_display': before
      '#options':
        2227: '2022 Fall'
        2231: '2023 Spring'
        2237: '2023 Fall'
        2241: '2024 Spring'
        2247: '2024 Fall'
        2251: '2025 Spring'
        2257: '2025 Fall'
        2261: '2026 Spring'
      '#required': true
      '#states':
        visible:
          ':input[name="which_of_these_apply_to_you_"]':
            value: TRN
      '#wrapper_attributes':
        class:
          - custom-required
    zip_code:
      '#type': textfield
      '#title': 'Zip code'
      '#title_display': before
      '#states':
        visible:
          ':input[name="are_you_applying_to_asu_as_a_"]':
            value: unique-status
    specialist_email:
      '#type': hidden
      '#title': 'Specialist email'
    specialist_nid:
      '#type': hidden
      '#title': 'Specialist nid'
    consent_text:
      '#type': processed_text
      '#text': |
        <style type="text/css">.rfi-consent-wording{
          font-size: 12px;
           margin-bottom: 0.5rem;
        }
        </style>
        <div class="rfi-consent-wording">
        <p>By submitting my information, I consent to ASU contacting me about education services using email, direct mail, SMS/texting and digital platforms. Message and data rates may apply. Consent is not required to receive services, and I can withdraw consent by contacting ASU at <a href="mailto:UnsubFutureStudentComm@asu.edu">UnsubFutureStudentComm@asu.edu</a> or as described in communications I receive. I consent to ASU’s <a href="https://asuonline.asu.edu/text-terms/">mobile terms and conditions</a> and <a href="https://asuonline.asu.edu/web-analytics-privacy-2/">Privacy Statements</a>, including the European Supplement.</p>
        </div>
      '#format': full_html
    i_consent:
      '#type': checkbox
      '#title': 'I consent'
      '#required': true
  form_trigger_element:
    '#type': hidden
    '#title': 'Form trigger element'
  actions:
    '#type': webform_actions
    '#title': 'Submit button(s)'
    '#attributes':
      class:
        - pt-2
    '#submit__label': Submit
    '#submit__attributes':
      class:
        - 'contact-form-button btn-gold'
