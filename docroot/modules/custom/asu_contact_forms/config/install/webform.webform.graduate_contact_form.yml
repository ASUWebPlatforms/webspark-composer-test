id: graduate_contact_form
title: 'Graduate contact form'
description: ''
category: ''
elements: |-
  which_one_of_these_apply_to_you_:
    '#type': radios
    '#title': 'Which one of these apply to you?'
    '#options':
      'On campus': 'I plan to take some/all of my classes in person on an ASU campus.'
      Online: 'I plan to take all of my classes online through ASU Online.'
      Military: 'I am a military-affiliated and/or veteran student planning to complete my courses on an ASU campus'
      considering: 'I am still considering'
    '#required': true
    '#wrapper_type': form_element
    '#wrapper_attributes':
      class:
        - cf-field
  who_do_you_have_questions_for_:
    '#type': radios
    '#title': 'Who do you have questions for?'
    '#options':
      admissionservices: 'Admission Services (questions regarding the admissions application, receipt of documents, I20 process, etc.)'
      academicprogram: 'My academic program (questions regarding deadlines, curriculum, admission requirements, etc.)'
      unsure: Unsure
    '#required': true
    '#states':
      visible:
        ':input[name="which_one_of_these_apply_to_you_"]':
          value:
            pattern: '^(On campus|considering)$'
    '#wrapper_type': form_element
    '#wrapper_attributes':
      class:
        - custom-required
    '#attributes':
      class:
        - 'cf-field '
  militray_rep_info:
    '#type': processed_text
    '#states':
      visible:
        ':input[name="which_one_of_these_apply_to_you_"]':
          value: Military
    '#text': |
      <div class="show-rep-info-div">
      <div class="profile_image"><img class="rep-image" src="https://admission.asu.edu/sites/default/files/warhol-joseph.jpg" /></div>

      <div class="right-col"><strong>Joseph is your contact</strong><br />
      <span class="smalltext">Please contact Joseph for information about admissions, requirements or any other questions you may have.<br />
      <br />
      <svg aria-hidden="true" class="svg-inline--fa fa-envelope fa-w-16" data-fa-i2svg="" data-icon="envelope" data-prefix="fa" focusable="false" role="img" style="width:2.5em;" viewbox="0 0 512 512" xmlns="http://www.w3.org/2000/svg"><path d="M502.3 190.8c3.9-3.1 9.7-.2 9.7 4.7V400c0 26.5-21.5 48-48 48H48c-26.5 0-48-21.5-48-48V195.6c0-5 5.7-7.8 9.7-4.7 22.4 17.4 52.1 39.5 154.1 113.6 21.1 15.4 56.7 47.8 92.2 47.6 35.7.3 72-32.8 92.3-47.6 102-74.1 131.6-96.3 154-113.7zM256 320c23.2.4 56.6-29.2 73.4-41.4 132.7-96.3 142.8-104.7 173.4-128.7 5.8-4.5 9.2-11.5 9.2-18.9v-19c0-26.5-21.5-48-48-48H48C21.5 64 0 85.5 0 112v19c0 7.4 3.4 14.3 9.2 18.9 30.6 23.9 40.7 32.4 173.4 128.7 16.8 12.2 50.2 41.8 73.4 41.4z" fill="currentColor"></path></svg><!-- <i class="fa fa-envelope" aria-hidden="true"> </i> Font Awesome fontawesome.com --><a href="mailto:asujoewarhol@asu.edu">&nbsp;asujoewarhol@asu.edu</a>&nbsp;&nbsp; <svg aria-hidden="true" class="svg-inline--fa fa-phone fa-w-16" data-fa-i2svg="" data-icon="phone" data-prefix="fa" focusable="false" role="img" style="width:2.5em;" viewbox="0 0 512 512" xmlns="http://www.w3.org/2000/svg"><path d="M493.4 24.6l-104-24c-11.3-2.6-22.9 3.3-27.5 13.9l-48 112c-4.2 9.8-1.4 21.3 6.9 28l60.6 49.6c-36 76.7-98.9 140.5-177.2 177.2l-49.6-60.6c-6.8-8.3-18.2-11.1-28-6.9l-112 48C3.9 366.5-2 378.1.6 389.4l24 104C27.1 504.2 36.7 512 48 512c256.1 0 464-207.5 464-464 0-11.2-7.7-20.9-18.6-23.4z" fill="currentColor"></path></svg><!-- <i class="fa fa-phone" aria-hidden="true"> </i> Font Awesome fontawesome.com --> &nbsp;480-965-5078 </span>

      <p>Schedule a time to connect with me: <a href="https://calendly.com/joe-warhol">https://calendly.com/joe-warhol</a></p>
      </div>
      </div>
    '#format': full_html
  online_rep_info:
    '#type': processed_text
    '#states':
      visible:
        ':input[name="which_one_of_these_apply_to_you_"]':
          value: Online
    '#text': |
      <div class="show-rep-info-div">
      <div class="right-col">
      <p><span class="smalltext">Please contact<br />
      <svg aria-hidden="true" class="svg-inline--fa fa-envelope fa-w-16" data-fa-i2svg="" data-icon="envelope" data-prefix="fa" focusable="false" role="img" style="width: 2rem;" viewbox="0 0 512 512" xmlns="http://www.w3.org/2000/svg"><path d="M502.3 190.8c3.9-3.1 9.7-.2 9.7 4.7V400c0 26.5-21.5 48-48 48H48c-26.5 0-48-21.5-48-48V195.6c0-5 5.7-7.8 9.7-4.7 22.4 17.4 52.1 39.5 154.1 113.6 21.1 15.4 56.7 47.8 92.2 47.6 35.7.3 72-32.8 92.3-47.6 102-74.1 131.6-96.3 154-113.7zM256 320c23.2.4 56.6-29.2 73.4-41.4 132.7-96.3 142.8-104.7 173.4-128.7 5.8-4.5 9.2-11.5 9.2-18.9v-19c0-26.5-21.5-48-48-48H48C21.5 64 0 85.5 0 112v19c0 7.4 3.4 14.3 9.2 18.9 30.6 23.9 40.7 32.4 173.4 128.7 16.8 12.2 50.2 41.8 73.4 41.4z" fill="currentColor"></path></svg>&nbsp; <a gradenrollment="" href="mailto:">gradenrollment@asuonline.asu.edu</a><br />
      <svg aria-hidden="true" class="svg-inline--fa fa-phone fa-w-16" data-fa-i2svg="" data-icon="phone" data-prefix="fa" focusable="false" role="img" style="width:2.5em;" viewbox="0 0 512 512" xmlns="http://www.w3.org/2000/svg"><path d="M493.4 24.6l-104-24c-11.3-2.6-22.9 3.3-27.5 13.9l-48 112c-4.2 9.8-1.4 21.3 6.9 28l60.6 49.6c-36 76.7-98.9 140.5-177.2 177.2l-49.6-60.6c-6.8-8.3-18.2-11.1-28-6.9l-112 48C3.9 366.5-2 378.1.6 389.4l24 104C27.1 504.2 36.7 512 48 512c256.1 0 464-207.5 464-464 0-11.2-7.7-20.9-18.6-23.4z" fill="currentColor"></path></svg>&nbsp;866-277-6589</span></p>
      </div>
      </div>
    '#format': full_html
  graduate_form:
    '#type': container
    '#title': 'Graduate form'
    '#title_display': invisible
    '#attributes':
      class:
        - pr-5
    form_intro:
      '#type': processed_text
      '#wrapper_attributes':
        class:
          - pt-2
      '#text': |
        <p><strong>Arizona State University would love to hear from you. If you have a question about ASU admission or anything else, please let us know.</strong></p>
      '#format': full_html
    what_s_your_question_:
      '#type': textarea
      '#title': 'Your message'
      '#title_display': before
      '#required': true
      '#counter_type': character
      '#counter_maximum': 255
    first_name:
      '#type': textfield
      '#title': 'First name'
      '#title_display': before
      '#required': true
    last_name:
      '#type': textfield
      '#title': 'Last name'
      '#title_display': before
      '#placeholder': 'Last name *'
      '#required': true
    email:
      '#type': email
      '#title': Email
      '#title_display': before
      '#required': true
    phone_number:
      '#type': tel
      '#title': Phone
      '#title_display': before
      '#international': true
    country_of_citizenship:
      '#type': select
      '#title': 'Country of citizenship'
      '#title_display': before
      '#options': country_names
      '#required': true
    degree_details:
      '#type': container
      '#title': 'Degree details'
      '#title_display': invisible
      '#attributes':
        class:
          - 'pt-2 pb-2 pr-2 mb-2'
      '#align_items': center
      degree_level:
        '#type': select
        '#title': 'Degree level'
        '#title_display': before
        '#options':
          17: Masters
          21: Doctoral
          cert: Certificate
          nd: Non-degree
        '#empty_value': '0'
        '#required': true
      select_area_of_interest:
        '#type': select
        '#title': 'Select area of interest'
        '#title_display': before
        '#options':
          'Architecture and Construction': 'Architecture and Construction'
          Arts: Arts
          Business: Business
          'Communication and Media': 'Communication and Media'
          'Computing and Mathematics': 'Computing and Mathematics'
          'Education and Teaching': 'Education and Teaching'
          'Engineering and Technology': 'Engineering and Technology'
          Entrepreneurship: Entrepreneurship
          'Health and Wellness': 'Health and Wellness'
          Humanities: Humanities
          'Interdisciplinary Studies': 'Interdisciplinary Studies'
          'Law, Justice and Public Service': 'Law, Justice and Public Service'
          Science: Science
          'Social and Behavioral Sciences': 'Social and Behavioral Sciences'
          Sustainability: Sustainability
        '#empty_value': '0'
        '#wrapper_attributes':
          class:
            - custom-required
      or_text:
        '#type': processed_text
        '#text': |
          <p class="pt-5"><span class="or-option"><strong>OR</strong></span></p>
        '#format': full_html
      select_a_school_or_college:
        '#type': select
        '#title': 'Select a school or college'
        '#title_display': before
        '#options': graduate_school_or_college
        '#empty_value': '0'
      select_program_of_interest:
        '#type': select
        '#title': 'Select program of interest'
        '#title_display': before
        '#options': graduate_program_of_interest
        '#empty_value': '0'
        '#required': true
        '#required_error': 'Please select program of interest'
      start_term:
        '#type': select
        '#title': 'Select a start date'
        '#title_display': before
        '#options': semester
        '#empty_option': 'Select a start date *'
        '#required': true
        '#required_error': 'Please select start date'
    consent_text:
      '#type': processed_text
      '#text': |
        <style type="text/css">.rfi-consent-wording{
          font-size: 12px;
           margin-bottom: 0.5rem;
        }
        </style>
        <div class="rfi-consent-wording">
        <p>By submitting my information, I consent to ASU contacting me about education services using email, direct mail, SMS/texting and digital platforms. Message and data rates may apply. Consent is not required to receive services, and I can withdraw consent by contacting ASU at <a href="mailto:UnsubFutureStudentComm@asu.edu">UnsubFutureStudentComm@asu.edu</a> or as described in communications I receive. I consent to ASU’s <a href="https://asuonline.asu.edu/text-terms/">mobile terms and conditions</a> and <a href="https://asuonline.asu.edu/web-analytics-privacy-2/">Privacy Statements</a>, including the European Supplement.</p>
        </div>
      '#format': full_html
    i_consent:
      '#type': checkbox
      '#title': 'I consent'
      '#required': true
  actions:
    '#type': webform_actions
    '#title': 'Submit button(s)'
    '#attributes':
      class:
        - pt-2
    '#submit__label': Submit
    '#submit__attributes':
      class:
        - grad-contact-form-button
