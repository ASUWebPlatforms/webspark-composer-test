# In order to to create pages it is necessary to define routes for them. A route
# maps a URL path to a controller. It defines with what function or method will
# be called when a URL is accessed. The following lines defines three of them
# for this module.

# Menu items corresponding to these URLs are defined separately in the
# page_example.links.menu.yml file.

# If the user accesses http://example.com/?q=examples/page-example/simple,
# the routing system will look for a route with that path. In this case it will
# find a match, and execute the _controller callback. Access to this path
# requires "access asu degree webservice page" permission.

asuaec_transferoption.refresh_form:
  path: '/admin/config/asu/transferoption'
  defaults:
    _form:  '\Drupal\asuaec_transferoption\Form\RefreshTransferOptionDegreeForm'
    _title: 'ASU Transfer option degrees'
  requirements:
    _permission: 'access asuaec transferoption page'

asuaec_transferoption.process:
  path: '/transferoption/{plancode}/{comm_college}'
  defaults:
    _title: 'Transfer Option'
    _controller: '\Drupal\asuaec_transferoption\Controller\TransferOptionNodeCreationController::process'
  requirements:
    _permission: 'access content'

asuaec_transferoption.autocomplete.keywords.mapp:
  path: '/admin/asuaec_transferoption/autocomplete/keywords/mapp'
  defaults:
    _controller: '\Drupal\asuaec_transferoption\Controller\KeywordAutoCompleteController::handleAutocomplete'
    _format: json
  requirements:
    _permission: 'access content'

asuaec_transferoption.autocomplete.keywords.tag:
  path: '/admin/asuaec_transferoption/autocomplete/keywords/tag'
  defaults:
    _controller: '\Drupal\asuaec_transferoption\Controller\KeywordAutoCompleteController::handleAutocomplete'
    _format: json
  requirements:
    _permission: 'access content'