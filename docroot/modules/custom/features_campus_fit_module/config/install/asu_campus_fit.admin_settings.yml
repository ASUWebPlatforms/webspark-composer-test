tempe_intro_content: "<div class=\"intro_of_campus\"><h4>Tempe campus</h4>\r\n<p>Students who find their fit at the Tempe campus are hungry for a fast-paced Pac-12 college experience. As the campus home to most of the Sun Devil athletics teams and a classic college town with a main street (in our case, it’s Mill Avenue), Tempe is the heart of Sun Devil nation.</p><p><span class=\"next_campus 6852\">Read more <i class=\"fas fa-plus\"></i></span></p></div>"
poly_intro_content: '<div class="intro_of_campus"><h4>Polytechnic campus</h4><p>Students who find their fit at the smaller Polytechnic campus don’t need flashy city lights and a ton of nightlife to keep them entertained. Polytechnic students tend to be a wildly creative bunch that makes their own fun.</p><p><span class="next_campus 6854">Read more <i class="fas fa-plus"></i></span></p></div>'
west_intro_content: '<div class="intro_of_campus"><h4>West campus</h4><p>Students who find their fit at the slower-paced West campus tend to value a small circle of tight-knit friends.</p><p><span class="next_campus 6853">Read more <i class="fas fa-plus"></i></span></p></div>'
