starbucks_content: "<p><strong>Starbucks and ASU believe you deserve the opportunity to pursue your education.</strong><br />\r\nYou can enroll in Arizona State University’s top-ranked undergraduate programs, delivered 100% online. Study from anywhere, anytime with full tuition coverage, for eligible partners. The Starbucks College Achievement Plan will help you create your bright future. <a href=\"https://starbucks.asu.edu/\">Learn more</a></p>"
uber_content: "<p><strong>A partnership between ASU, Uber and Uber eats that gives drivers and delivery people (or eligible family members) tuition coverage.</strong><br />\r\nYou have access to a high-quality education that helps you get ahead in life thanks to the ASU, Uber and Uber Eats Education partnership. By providing full tuition coverage, we’re offering drivers, delivery people or a member of their family a way to take classes toward an undergraduate degree or learn new skills through continuing education courses.<br />\r\n<a href=\"https://uber.asu.edu/\">More Info for Drivers</a><br />\r\n<a href=\"https://ubereats.asu.edu/\">More Info for Delivery People</a><br /></p>\r\n"
catalyst_content: ''
otherparterns_content: "<p><strong>ASU leads the way in empowering educational access via corporate partnerships </strong><br />\r\nThrough ASU, you have access to a high-quality education that helps you get ahead in life. Check with your employer for application process options. If you have any questions, please call our ASU Online enrollment team at 844-353-7953.</p>\r\n"
'Meeting people from all over the world, and/or studying abroad': ''
meeting_people: "At ASU, you’ll meet all sorts of new people — people a lot like you and people completely different from you — and you’ll learn from many of them. One of the best ways to get started meeting new people is by joining a <a href=\"https://eoss.asu.edu/clubs\">student club</a>. There are more than 1,000 of them to choose from at ASU, and you can even start a club of your own. Another good way to meet new people is to join an <a href=\"https://fitness.asu.edu/programs/intramurals\">intramural sports team</a>. A wide variety of sports are offered for every skill level. It’s an instant way to build camaraderie. You can also attend various <a href=\"https://asuevents.asu.edu/\">ASU events</a>. There is always something going on, and you’re likely to meet people with similar interests as you at an event.\r\n"
living_on_my_own: 'The idea of being out on your own is exciting. Of course, without your family right there, you’ll have new responsibilities and new skills to learn. ASU''s <a href="https://adulting.asu.edu/">Adulting 101</a> blog and newsletter are here to help you navigate the world of responsible adulthood. The advice offered goes beyond the classroom (though there is that, too) and helps you make a successful transition to adulthood.'
learning_from_professors: 'At ASU, you can study with some of the world’s most brilliant minds. Our <a href="https://www.asu.edu/academics/faculty-excellence">professors</a> are experts at the top of their fields and have earned Nobel and Pulitzer Prizes, are Guggenheim and MacArthur Fellows, and are members of the National Academy of Sciences and much more. But they are also academic mentors there to guide you on a journey to next-level learning.'
learning_how_to_start_business: 'If you have a great idea for a business or an invention, ASU is the place to refine and launch it. The <a href="https://entrepreneurship.asu.edu/">J. Orin Edson Entrepreneurship + Innovation Institute</a> has helped drive tons of student startups through mentorship, workspace and funds to get it off the ground. Here you can learn step-by-step how to launch a startup or product and begin making an impact on the world while you’re still in college.'
work_on_innovative_ideas: 'At ASU, we conduct <a href="https://www.asu.edu/research">research</a> that results in real benefits to society. We call it “use-inspired research.” And even as an undergraduate you can work alongside a professor on a research project that has a positive impact and makes a difference in the world.'
learning_in_innovative_ways: 'ASU offers lots of ways to gain knowledge through technology-enhanced learning. One example is <a href="https://www.dreamscapelearn.com/">Dreamscape Learn</a>, a virtual-reality-based experience that turns you into an explorer where you can learn and discover in ways never before imagined. ASU’s overall mindset for instruction is “hands-on,” where you learn by doing and immersing yourself in the learning experience.'
learning_to_think_creatively: 'Solving challenges — whether complex global challenges or challenges in your day-to-day life — requires creative thinking. ASU offers plenty of classes and programs that will help you hone your creative-thinking and problem-solving skills so you’re better prepared to take on challenges big and small. You’ll also have lots of opportunities to work as a team with your fellow classmates on research, entrepreneurial activities or an important challenge that needs a creative solution.'
living_in_fun: 'When you combine an innovative spirit, incredible opportunities and a culture of community, you get the metro Phoenix area. It’s a place where new ideas are born and developed, where experimentation and collaboration are encouraged, and where you can instantly become part of it all through <a href="https://career.asu.edu/internships-learning-doing">internships</a> and other experiences. And as the fifth-largest city in the U.S., <a href="https://admission.asu.edu/campus-life/phoenix">Phoenix offers something for everyone</a> including miles of hiking trails, professional sports, big name concerts, cultural venues and outstanding restaurants for every taste — not to mention more than 300 days of sunshine a year so you can enjoy it all.'
