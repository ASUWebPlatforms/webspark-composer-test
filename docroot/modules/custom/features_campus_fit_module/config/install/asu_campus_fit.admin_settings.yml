campusRes_heading: 'ASU offers an affordable tuition rate for Arizona students'
campusRes: '<p>The average ASU resident student pays $2,200 per year when financial aid and an on-campus job are factored in. We’ve also committed to not raise in-state tuition more than 3 percent per year, and many years we don’t raise it at all. Arizona students with a financial need can have all of their tuition costs covered through the College Attainment Grant or the Obama Scholars Program. <a href="https://admission.asu.edu/aid/resident-first-year">Learn more about how affordable ASU can be for Arizona students</a>.</p>'
CARes_heading: 'ASU welcomes our California neighbors'
CARes: '<p>In fact, 5,000 students at ASU are from California. And students from the Golden State studying certain programs may be eligible for the <a href="https://admission.asu.edu/wue"Western Undergraduate Exchange program</a> where they can save big on tuition. With a similar climate to California and a short drive or flight back home, ASU might be the perfect choice for you. <a href="https://yourfuture.asu.edu/california">Learn more about being a student from California at ASU</a>.</p>'
wue_heading: 'A western state other than Arizona:'
wueRes: '<p>Offering a lower tuition rate for students from other western states is the neighborly thing to do. That’s why ASU participates in the Western Undergraduate Exchange program. You can choose from more than 100 programs on three different campuses and be eligible to receive a huge tuition discount — roughly $12,000 a year. <a href="https://admission.asu.edu/wue">Learn more about the WUE program</a>.</p>'
intlRes_heading: 'Non-U.S. citizen and live in another country'
intlRes: '<p>ASU offers international students a welcoming, inclusive university community. We are the top public college choice of international students — more than 10,000 students from more than 130 countries call ASU home. ASU offers highly ranked degree programs and is ranked the #1 school for innovation in the U.S. See all of our rankings and <a href="https://admission.asu.edu/international">learn more about studying at ASU</a> as an international student.</p>'
terRes_heading: 'In another U.S. state or territory'
terRes: '<p>ASU is like a mirror image of the world. We’re home to students from all 50 states and more than 130 countries around the globe. This makes ASU one of the most diverse schools in the world. You’ll meet people who are similar to you and people who are completely opposite from you and you’ll have the opportunity to learn from them all.</p>'
