downtown_intro_content: '<div class="intro_of_campus"><h4>Downtown campus</h4><p>Students who find their fit at the Downtown Phoenix campus enjoy the feeling of city life.</p><p><span class="next_campus 6853">Read more <i class="fas fa-plus"></i></span></p></div>'
havasu_intro_content: '<div class="intro_of_campus"><h4>ASU in Lake Havasu</h4><p>Students who find their fit at ASU in Lake Havasu are looking for personal attention from instructors and outdoorsy lifestyles.</p><p><span class="next_campus 6850">Read more <i class="fas fa-plus"></i></span></p></div>'
asuLocalDc: "<p>You are recommended for: <strong>ASU Local–Washington DC</strong><br />\r\nAt ASU Local–Washington DC, the nation’s capital will serve as your classroom. You'll immerse yourself in a city rich with history and get together with your cohort mates and success coaches at the ASU Washington Center, located only a 10-minute walk from the White House. Engage in college learning and career preparation in person, with the flexibility to complete your coursework on ASU’s highly interactive online platforms — delivered by the same faculty who teach on our ASU campus.</p><p><a href=\"https://asulocal.asu.edu/washington-dc/\" class=\"btn btn-maroon\" role=\"button\"><span class=\"text\">Learn more</span></a></p> \r\n"
asuLocalYuma: "<p>You are recommended for: <strong>ASU Local–Yuma</strong><br />\r\nArizona Western College students can seamlessly transfer to ASU Local–Yuma, which is embedded in the Student Success Center on the AWC-Yuma campus. Grab a drink at Starbucks before meeting with your cohort mates and coach to engage in college and career success learning in person at the ASU Local space while having the flexibility to complete your coursework on ASU’s highly interactive online platforms delivered by the same faculty who teach on campus.</p><p><a href=\"https://asulocal.asu.edu/yuma/\" class=\"btn btn-maroon\" role=\"button\"><span class=\"text\">Learn more</span></a></p> \r\n"
asuLocalLA: "<p>You are recommended for: <strong>ASU Local–Los Angeles</strong><br />\r\nImmerse yourself in one of the world’s most creative cities when you choose ASU Local–Los Angeles for your college learning experience. Get together with your cohort mates and success coaches at the ASU California Center inside the historic Herald Examiner building, located only a few blocks from the Crypto.com arena. Engage in college learning and career preparation in person, with the flexibility to complete your coursework on ASU’s highly interactive online platforms — delivered by the same faculty who teach on our ASU campus.</p><p><a href=\"https://asulocal.asu.edu/los-angeles/\" class=\"btn btn-maroon\" role=\"button\"><span class=\"text\">Learn more</span></a></p> \r\n"
