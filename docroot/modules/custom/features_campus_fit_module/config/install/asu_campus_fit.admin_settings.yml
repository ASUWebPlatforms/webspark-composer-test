new_people_heading: 'A new place with new people'
new_people: 'Adjusting to a new place with new people can be nerve-wracking. Realizing that there are thousands of other new students in the same situation as you can help. And so can some of the resources ASU offers. First, ASU’s <a href="https://adulting.asu.edu/">Adulting 101 blog</a> offers tips and advice to handle all aspects of living on your own and starting college, and it goes beyond the classroom to offer practical advice on the fine art of adulting. You can also connect with a <a href="https://success.asu.edu/">First-Year Success coach</a>. This free service matches you with an upper-division student who has been where you are and can help you navigate your first year as an ASU student. We also offer free, confidential <a href="https://eoss.asu.edu/counseling">24/7 counseling</a> — if things feel a bit too overwhelming you can connect with one of our certified counselors, because sometimes just talking to someone can help you feel better, improve your grades and better manage stress.'
rigorous_academics_of_college_heading: 'The rigorous academics of college'
rigorous_academics_of_college: 'It’s no secret that college academics are more rigorous than high school academics. This can be a bit of a shock to some students who aren’t ready for it. But ASU has several resources that can prepare you for challenging academics. First, free <a href="https://tutoring.asu.edu/">tutoring</a> is available through University Academic Success Programs. There you can get extra help with whatever you may be struggling with. Second, all of your professors will offer <a href="https://www.youtube.com/watch?v=yQq1-_ujXrM">office hours</a> every week. This is your chance to meet with them face to face and discuss any concepts you’re struggling with. Third, ASU offers free <a href="https://success.asu.edu/">First-Year Success coaching</a>. Through this program, you can connect with an upper-division student who has been where you are and can help you navigate your first year as a college student. And finally, if you are feeling a bit too overwhelmed, ASU offers free, confidential 24/7 counseling. You can connect with a certified counselor, because sometimes just talking with someone can help you feel better and improve your grades.'
living_first_time_heading: 'Living on my own for the first time'
living_first_time: 'The idea of living on your own for the first time likely brings feelings of excitement and maybe a little anxiety. That’s normal. But ASU has support resources to help make the transition easier. First, if you’re living in an <a href="https://housing.asu.edu/">ASU residence hall</a>, you’ll have a community assistant on your floor. A community assistant, or CA, is a student who lives in the residence hall and is there to help you with any questions, problems or concerns you’re having. You’ll also be placed on the same floor as other students in your major, so between seeing them in class and across the hall, you’ll make friends pretty quickly. You’ll also have access to a <a href="https://success.asu.edu/">First-Year Success coach</a>, an upper-division student who is there to help you navigate your first year in college. And ASU’s <a href="https://adulting.asu.edu/">Adulting 101 blog</a> offers all sorts of advice about living on your own for the first time. Finally, if you are really struggling, you always have access to free, confidential 24/7 counseling where you can connect with a certified counselor, because sometimes just having someone to talk to can help you feel better.'
right_major_heading: 'Choosing the right major'
right_major: 'Choosing the right major is a big decision, but possibly not quite as big a decision as you would think. First, it’s common for students to <a href="https://changingmajors.asu.edu/">switch majors</a> at least once, sometimes even three or four times — and often without losing any time or credit on the path to their degree. Secondly, the world is filled with stories about people successfully working in careers that have nothing to do with what they majored in. Still, you want to choose the right major for you, and we can help. The <a href="https://yourfuture.asu.edu/me3">me3® tool</a> is a fun picture quiz that reveals three possible careers that you may thrive in and three degrees that you can pursue to get there. And at ASU, you have access to an academic advisor who can help you determine the best academic path to take to reach your goals. Additionally, as a first-year student we can match you with a <a href="https://success.asu.edu/">First-Year Success coach</a>, an upper-division student who is there to help you navigate your first year as a college student and can also share their experience and guidance in choosing a major.'
paying_for_college_nervous_heading: 'Paying for college'
paying_for_college_nervous: 'It’s no secret that the cost of going to college isn’t cheap. It’s an investment and all investments have upfront costs. But college is an investment in yourself, and it pays dividends. Fortunately, you have access to a lot of different ways to help pay for it. The first thing you should do is file the Free Application for Federal Student Aid, or <a href="https://studentaid.gov/h/apply-for-aid/fafsa">FAFSA</a>. This will show you how much money you are qualified to receive in federal grants, work-study and loans. Then you should start looking and applying for scholarships, both ASU scholarships and private ones. Apply for any and all that you qualify for no matter how much they offer — the money adds up quickly. And even if you think you won’t qualify for any financial aid, you should still apply. You might be surprised. <a href="https://students.asu.edu/financial-aid">Learn more about financial aid at ASU</a>.'
making_friends_heading: 'Making friends'
making_friends: 'Lots of new college students are worried that they won’t make friends, but as long as you put a little effort into it, it can be surprisingly easy to find your niche in college and start making friends. One of the best ways to meet new people is to join a <a href="https://eoss.asu.edu/clubs">student club</a>. There are more than 1,000 clubs at ASU catering to a wide range of interests. Joining an <a href="https://fitness.asu.edu/programs/intramurals>intramural sports team</a> is another good way to meet new friends. And you don’t even have to a good athlete to join — there are intramural teams for a variety of sports and skill levels. Also, consider attending <a href="https://asuevents.asu.edu/">ASU events</a>. You’re likely to meet fellow students with similar interests here.'
my_way_around_heading: 'FInding my way around (campus maps)'
my_way_around: 'The first week or so on campus can have you feeling a little lost and uncomfortable when you’re not sure where your classes are, where to get a coffee or a bite to eat, or where important campus buildings are such as student services or the library. So start by studying a <a href="https://www.asu.edu/map/interactive/">map</a> of your campus before classes begin, and if you can, walk around campus a day or two before classes start so you become more familiar with where everything is. And rest assured that before you know it, you’ll know every inch of your campus.'
