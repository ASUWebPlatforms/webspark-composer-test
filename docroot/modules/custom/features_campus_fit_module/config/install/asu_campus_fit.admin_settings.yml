meeting_people_from_world: 'ASU welcomes people from all 50 states and more than 130 countries around the world who you can meet, work with and learn from. You can also choose from more than 250 <a href="https://goglobal.asu.edu/">study abroad experiences</a>, where you can spend between one week and one academic year studying in another country, learning from its people and embracing its culture. You’ll gain a lifelong global competency that will prepare you to investigate the world, recognize perspectives, communicate ideas and take action.'
