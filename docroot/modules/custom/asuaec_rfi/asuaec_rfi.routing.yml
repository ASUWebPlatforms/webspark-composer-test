asuaec_rfi.json.categories.ugrad:
  path: '/admin/asuaec_rfi/json/categories/ground/ugrad'
  defaults:
    _controller: '\Drupal\asuaec_rfi\Controller\JsonController::generateJsonCat'
    _format: json
  requirements:
    _permission: 'access content'

