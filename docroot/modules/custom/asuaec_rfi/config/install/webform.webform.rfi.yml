    - asuaec_rfi
_core:
  default_config_hash: 6szOXjo7zLGBH1gYWS9VFcyxvzVzz0bbZh84Rr_pFFM
open: null
close: null
weight: 0
uid: 1
template: false
archive: false
id: rfi
title: RFI
description: ''
category: ''
elements: |-
  step_1:
    '#type': webform_wizard_page
    '#title': 'Step 1'
    plan:
      '#type': hidden
      '#title': plan
      '#default_value': '[current-page:query:plan]'
    prog:
      '#type': hidden
      '#title': prog
      '#default_value': '[current-page:query:prog]'
    name:
      '#type': hidden
      '#title': name
      '#default_value': '[current-page:query:name]'
    grad_ugrad:
      '#type': hidden
      '#title': grad_ugrad
    interest1:
      '#type': hidden
      '#title': 'interest1 - Used for post. Area of interest.'
    birthdate:
      '#type': hidden
      '#title': 'BirthDate - Used for post.'
    entryterm:
      '#type': hidden
      '#title': ' EntryTerm - Used for post.'
    came_from_degree_search:
      '#type': hidden
      '#title': 'Came from Degree Search'
      '#default_value': 'false'
    hide_institution_dropdown:
      '#type': hidden
      '#title': 'Hide Institution dropdown'
      '#default_value': 'true'
    hide_highschool_dropdown:
      '#type': hidden
      '#title': 'Hide highschool dropdown'
      '#default_value': 'true'
    request_information_intro:
      '#type': webform_markup
      '#markup': |-
        <h4>Step 1 of 3</h4>

        <h2>Request information</h2>

        <p>To learn more about ASU or a specific program, fill out the form below then check your email.</p>
    campus_options:
      '#type': select
      '#title': 'Which applies to you?'
      '#options':
        GROUND: 'I plan to take some/all of my classes on campus'
        ONLNE: 'I plan to study 100% online through ASU Online'
        NOPREF: 'I am not sure'
      '#empty_option': Select...
      '#empty_value': '0'
      '#required': true
      '#states':
        visible:
          ':input[name="plan"]':
            value:
              pattern: '^(^$|\[current-page:query:plan\])$'
    student_type_options_default:
      '#type': select
      '#title': 'Select your student status'
      '#options':
        'First Time Freshman': 'First-year undergraduate'
        Transfer: 'Transferring undergraduate'
        Readmission: 'Graduate (Masters, PhD, EdD, DNP, etc.)'
      '#empty_option': Select...
      '#empty_value': '0'
      '#required': true
      '#states':
        visible:
          - ':input[name="prog"]':
              value:
                pattern: '(^$|^UG.*)$'
          - or
          - ':input[name="plan"]':
              value:
                pattern: '^(^$|\[current-page:query:plan\])$'
    area_of_interest_empty:
      '#type': select
      '#title': 'Area of interest'
      '#options': area_of_interest_empty
      '#empty_option': Select...
      '#empty_value': '0'
      '#states':
        visible:
          - ':input[name="campus_options"]':
              value:
                pattern: ^(0)$
          - or
          - ':input[name="student_type_options_default"]':
              value:
                pattern: ^(0)$
      '#wrapper_attributes':
        class:
          - area-interest-empty
      '#label_attributes':
        class:
          - area
    area_of_interest_ugrad:
      '#type': select
      '#title': 'Area of interest'
      '#options': area_of_interest_ugrad
      '#empty_option': Select...
      '#empty_value': '0'
      '#required': true
      '#states':
        visible:
          ':input[name="campus_options"]':
            value:
              pattern: ^(GROUND|NOPREF)$
          ':input[name="student_type_options_default"]':
            value:
              pattern: '^(First Time Freshman|Transfer)$'
    area_of_interest_grad:
      '#type': select
      '#title': 'Area of interest'
      '#options': area_of_interest_grad
      '#empty_option': Select...
      '#empty_value': '0'
      '#required': true
      '#states':
        visible:
          ':input[name="campus_options"]':
            value:
              pattern: ^(GROUND|NOPREF)$
          ':input[name="student_type_options_default"]':
            value: Readmission
    area_of_interest_ugrad_online:
      '#type': select
      '#title': 'Area of interest'
      '#options': area_of_interest_ugrad_online
      '#empty_option': Select...
      '#empty_value': '0'
      '#required': true
      '#states':
        visible:
          ':input[name="campus_options"]':
            value: ONLNE
          ':input[name="student_type_options_default"]':
            value:
              pattern: '^(First Time Freshman|Transfer)$'
    area_of_interest_grad_online:
      '#type': select
      '#title': 'Area of interest'
      '#options': area_of_interest_grad_online
      '#empty_option': Select...
      '#empty_value': '0'
      '#required': true
      '#states':
        visible:
          ':input[name="campus_options"]':
            value: ONLNE
          ':input[name="student_type_options_default"]':
            value: Readmission
    program_of_interest_text:
      '#type': textfield
      '#title': 'Program of interest'
  step_2:
    '#type': webform_wizard_page
    '#title': 'Step 2'
    about_me:
      '#type': webform_markup
      '#markup': |-
        <h4>Step 2 of 3</h4>

        <h2>About me</h2>
    email_address:
      '#type': email
      '#title': 'Email address'
      '#required': true
      '#pattern': '^[\w\-\._]+@[\w\-\._]+\.\w{2,10}$'
      '#pattern_error': 'Please check email address.'
    first_name:
      '#type': textfield
      '#title': 'First name'
      '#required': true
    last_name:
      '#type': textfield
      '#title': 'Last name'
      '#required': true
    phone:
      '#type': tel
      '#title': Phone
      '#description': '+1 (123) 456-7890'
      '#required': true
      '#international': true
      '#international_initial_country': US
      '#telephone_validation_format': '0'
    postal_code:
      '#type': textfield
      '#title': 'Postal code'
      '#required': true
      '#counter_type': character
      '#counter_maximum': 10
      '#counter_maximum_message': 'Max 10 digits'
    entry_term:
      '#type': select
      '#title': 'When do you anticipate starting at ASU?'
      '#options': entry_term
      '#empty_option': Select...
      '#required': true
      '#states':
        invisible:
          ':input[name="grad_ugrad"]':
            value: GRAD
    grad_entry_term:
      '#type': fieldset
      '#title': 'Grad entry term'
      '#title_display': invisible
      '#states':
        visible:
          ':input[name="grad_ugrad"]':
            value: GRAD
      '#format': container
      entry_term_text:
        '#type': textfield
        '#title': ' When do you anticipate starting at ASU? '
    gdpr_consent:
      '#type': checkboxes
      '#title': 'By submitting my information, I consent to ASU contacting me about education services using email, direct mail, SMS/texting and digital platforms. Message and data rates may apply. Consent is not required to receive services, and I can withdraw consent by contacting ASU at UnsubFutureStudentComm@asu.edu or as described in communications I receive. I consent to ASU’s mobile terms and conditions and Privacy Statements, including the European Supplement.'
      '#description': '<p>By submitting my information, I consent to ASU contacting me about education services using email, direct mail, SMS/texting and digital platforms. Message and data rates may apply. Consent is not required to receive services, and I can withdraw consent by contacting ASU at <a href="mailto:UnsubFutureStudentComm@asu.edu">UnsubFutureStudentComm@asu.edu</a> or as described in communications I receive. I consent to ASU&rsquo;s <a href="https://asuonline.asu.edu/text-terms/">mobile terms and conditions</a> and <a href="https://asuonline.asu.edu/web-analytics-privacy-2/">Privacy Statements</a>, including the European Supplement.</p>'
      '#title_display': none
      '#description_display': before
      '#options':
        1: 'I consent'
      '#required': true
  step_3:
    '#type': webform_wizard_page
    '#title': 'Step 3'
    more_about_me:
      '#type': webform_markup
      '#markup': |-
        <h4>
          Step 3 of 3
        </h4>
        <h2>
          More about me
        </h2>
    citizenship_country:
      '#type': select
      '#title': 'Country of citizenship'
      '#options': country_codes
      '#required': true
      '#default_value': US
    address:
      '#type': textfield
      '#title': Address
    city:
      '#type': textfield
      '#title': City
      '#counter_type': character
      '#counter_maximum': 40
      '#counter_maximum_message': 'Max 40 characters'
    country:
      '#type': select
      '#title': Country
      '#options': country_codes
      '#required': true
      '#default_value': US
    state_or_province:
      '#type': select
      '#title': 'State or Province'
      '#options': asu_us_state_name
      '#states':
        enabled:
          ':input[name="country"]':
            value: US
    zip_code:
      '#type': textfield
      '#title': 'Zip code'
      '#counter_type': character
      '#counter_maximum': 10
      '#counter_maximum_message': 'Max 10 digits'
    set_us_highschool:
      '#type': fieldset
      '#title': 'High school you are currently attending'
      '#states':
        visible:
          ':input[name="campus_options"]':
            value:
              pattern: ^(^$|GROUND|NOPREF)$
          ':input[name="student_type_options_default"]':
            value: 'First Time Freshman'
          ':input[name="country"]':
            value: US
          ':input[name="hide_highschool_dropdown"]':
            value: 'false'
      hsstate:
        '#type': select
        '#title': 'High school state'
        '#options': asu_us_state
        '#empty_option': Select...
        '#empty_value': '0'
      hscity:
        '#type': textfield
        '#title': 'High school city'
      hsname:
        '#type': textfield
        '#title': 'High school name'
    set_us_institution:
      '#type': fieldset
      '#title': 'The most recent school that you’ve attended'
      '#states':
        visible:
          ':input[name="campus_options"]':
            value:
              pattern: ^(GROUND|NOPREF)$
          ':input[name="student_type_options_default"]':
            value: Transfer
          ':input[name="country"]':
            value: US
          ':input[name="hide_institution_dropdown"]':
            value: 'false'
      istate:
        '#type': select
        '#title': 'Institution state'
        '#options': asu_us_state
        '#empty_option': Select...
        '#empty_value': '0'
      icity:
        '#type': textfield
        '#title': 'Institution city'
      iname:
        '#type': textfield
        '#title': 'Institution name'
    date_of_birth:
      '#type': date
      '#title': 'Date of Birth'
      '#date_date_min': '-99 years'
      '#date_date_max': '-10 years'
      '#date_date_format': ''
    veteran_status_options:
      '#type': select
      '#title': 'Military/veteran status'
      '#options':
        None: None
        'Active Duty': 'Active Duty'
        'National Guard': 'National Guard'
        Veteran: Veteran
        'Armed forces reserve': 'Armed forces reserve'
        Spouse/Dependent: Spouse/Dependent
      '#required': true
      '#states':
        visible:
          ':input[name="citizenship_country"]':
            value: US
      '#default_value': None
    comments:
      '#type': textarea
      '#title': 'Do you have any questions?'
      '#pattern': '^[\s\x20-\xff\x{2000}-\x{206f}]*$'
      '#pattern_error': 'Plain text only'
    asuonline_enterpriseclientid:
      '#type': hidden
      '#title': 'ASU Online enterpriseclientid'
