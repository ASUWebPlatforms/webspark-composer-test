asu_tuition.search_form:
  path: "/tuition-search"
  defaults:
    _form: '\Drupal\asu_tuition\Form\AsuTuitionSearchPage'
    _title: "ASU Tuition search page"
  requirements:
    _permission: "access content"
  options:
    no_cache: TRUE

asu_tuition.result_page:
  path: "/tuition/results"
  defaults:
    _controller: '\Drupal\asu_tuition\Controller\AsuTuitionResultPage::result_page'
    _title: "ASU Tuition Estimator"
  requirements:
    _permission: "access content"

asu_tuition.result_json_page:
  path: "/tuition/results/json"
  defaults:
    _controller: '\Drupal\asu_tuition\Controller\AsuTuitionResultJsonPage::result_json_page'
    _title: "ASU Tuition Estimator Json"
  requirements:
    _permission: "access content"

asu_tuition.data_page:
  path: "/admin/tuition/table/asu_tuition_acad_career"
  defaults:
    _controller: '\Drupal\asu_tuition\Controller\AsuTuitionAdminPage::data_page'
    _title: "ASU Tuition Estimator Table Data"
  requirements:
    _permission: "administer asu tuition"

asu_tuition.admin_settings:
  path: "/admin/config/content/tuition"
  defaults:
    _form: '\Drupal\asu_tuition\Form\AsuTuitionAdminSettingsForm'
    _title: "ASU tuition estimator"
    _link_id: "asu_tuition.admin_settings"
    _description: "Configure ASU tuition estimator settings."
  requirements:
    _permission: "administer asu tuition"

