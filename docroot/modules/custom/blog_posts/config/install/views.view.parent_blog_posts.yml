          content:
            value: "<script type=\"text/javascript\">\r\n(function($){\r\n   $(document).ready(function(){\r\n      var tax_id = $('.tax_active').attr('id'); \r\n       $('#edit-field-categories-target-id-1').val('1'); \r\n      var nid= $('.blog-nid').text();\r\n      $('#edit-nid').val(nid);\r\n      if((tax_id.length > 0) && (nid.length > 0)){\r\n         $('#edit-submit-parent-blog-posts').trigger('click');\r\n      }\r\n\r\n     //code to change taxonomy link urls to category pages\r\n        $('.rcat-tag-link').each(function(){\r\n             var id = $(this).attr('id'); \r\n             if(id == 1){ \r\n                $(this).attr('href','https://arcws82521-admission-asu.ws.asu.edu/parent-blog/academic');\r\n             }\r\n             if(id == 4){ \r\n                $(this).attr('href','https://arcws82521-admission-asu.ws.asu.edu/parent-blog/preparing-college');\r\n             } \r\n             if(id == 3){ \r\n                $(this).attr('href','https://arcws82521-admission-asu.ws.asu.edu/parent-blog/financial');\r\n             }\r\n             if(id == 2){ \r\n                $(this).attr('href','https://arcws82521-admission-asu.ws.asu.edu/parent-blog/college-life');\r\n             }\r\n\r\n        });\r\n\r\n   //code to set height of the cards\r\n/*$(window).bind(\"load\", function() { \r\n   var rmaxHeight = 0;\r\n\r\n    $(\".h1-100\").each(function(){\r\n        if ($(this).height() > rmaxHeight) { rmaxHeight = $(this).height();  console.log(rmaxHeight);}\r\n    });\r\n\r\n \r\n    $(\".parent-front-posts\").height(rmaxHeight);\r\n   */\r\n\r\n      //code to remove image if video exists in blog posts\r\n      var video_content = $('.blog_video_col').html().length; \r\n      if(video_content > 3){ \r\n          $('.blog-svg-image-top').hide(); \r\n       }\r\n\r\n        \r\n\r\n\r\n\r\n   });\r\n})(jQuery);\r\n</script>\r\n"
            format: full_html
