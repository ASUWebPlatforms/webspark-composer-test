id: subscribe_to_the_college_bound_b
title: 'Subscribe to the College Bound Blog'
description: ''
category: ''
elements: |-
  parent_first_name:
    '#type': textfield
    '#title': 'Parent first name'
    '#required': true
  parent_last_name:
    '#type': textfield
    '#title': 'Parent last name'
    '#required': true
  parent_email_address:
    '#type': email
    '#title': 'Parent email address'
    '#placeholder': 'Enter email'
    '#required': true
    '#default_value': '[current-page:query:newsletter_email]'
  country:
    '#type': select
    '#title': Country
    '#options': country_names
    '#required': true
    '#states':
      visible:
        ':input[name="country"]':
          value: 'United States'
    '#default_value': 'United States'
  zip_code:
    '#type': textfield
    '#title': 'Zip code'
    '#required': true
  postal_code:
    '#type': textfield
    '#title': 'Postal code'
    '#required': true
    '#states':
      visible:
        ':input[name="country"]':
          '!value': 'United States'
  my_student_will_graduate_from_high_school_in:
    '#type': select
    '#title': 'My student will graduate from high school in'
    '#options':
      2207: '2021'
      2217: '2022'
      2227: '2023'
      2237: '2024'
      2247: '2025 and beyond'
    '#required': true
  form_location:
    '#type': hidden
    '#title': 'Form location'
    '#default_value': '[current-page:query:loc]'
  i_m_reading_this_blog_to_learn_more_about_c:
    '#type': checkboxes
    '#title': 'I’m reading this blog to learn more about:'
    '#options':
      academic: 'Helping my student figure out what to study in college'
      financial: 'Figuring out how to pay for college'
      'college prep': 'Helping my student be prepared to succeed in college'
      'college life': 'What life at college will be like for my student'
      1: 'The college admission process'
      2: 'Attending ASU'
  from:
    '#type': hidden
    '#title': From
    '#default_value': '[current-page:query:from]'
  street_address:
    '#type': textfield
    '#title': 'Street address'
    '#required': true
    '#states':
      visible:
        - ':input[name="form_location"]':
            empty: true
        - or
        - ':input[name="form_location"]':
            value: menu
  phone_number:
    '#type': textfield
    '#title': 'Phone number'
    '#states':
      visible:
        - ':input[name="form_location"]':
            empty: true
        - or
        - ':input[name="form_location"]':
            value: menu
  parent_birth_year:
    '#type': textfield
    '#title': 'Parent birth year'
    '#required': true
    '#states':
      visible:
        - ':input[name="form_location"]':
            empty: true
        - or
        - ':input[name="form_location"]':
            value: menu
  occupation:
    '#type': textfield
    '#title': Occupation
    '#states':
      visible:
        - ':input[name="form_location"]':
            empty: true
        - or
        - ':input[name="form_location"]':
            value: menu
  spouse_name:
    '#type': textfield
    '#title': 'Spouse name'
    '#states':
      visible:
        - ':input[name="form_location"]':
            empty: true
        - or
        - ':input[name="form_location"]':
            value: menu
  student_information_:
    '#type': fieldset
    '#title': 'Student information:'
    first_name:
      '#type': textfield
      '#title': 'First name'
      '#required': true
    last_name:
      '#type': textfield
      '#title': 'Last name'
      '#required': true
    st_email_address:
      '#type': email
      '#title': 'Email address'
      '#required': true
    date_of_birth:
      '#type': date
      '#title': 'Date of birth'
      '#required': true
    my_student_is_a_:
      '#type': select
      '#title': 'My student is a:'
      '#options':
        1: 'First-year freshman'
        6: 'Transfer student'
        17: 'Graduate student'
      '#required': true
    is_your_student_a_citizen_of_a_country_outside_of_the_us_:
      '#type': radios
      '#title': 'Is your student a citizen of a country outside of the US?'
      '#options':
        'Yes': 'Yes'
        'No': 'No'
      '#required': true
  processed_text:
    '#type': processed_text
    '#text': |
      <style type="text/css">/* GDPR consent text */
      	.ol-list {
      		list-style: none; 
      		counter-reset: li;
      		padding-left: 15px;
      	}
      	.ol-list li::before {
      		content: counter(li); 
      		color: #000;
      		font-weight: bold;
      		display: inline-block; 
      		width: 1em;
      		margin-left: -1em;
      		background-color: #FFC627;
      		text-align: center;
      		float: left;
      		margin-right: 10px;
      	}	
      	.ol-list li {
      		counter-increment: li;
      		margin-bottom: 5px;
      	}
      	.consent {
      		width: 90%;
      		/*display: inline-block;*/
      	}
         
      ol{
         list-style-type: none !important;
      }
      </style>
      <p><strong>By completing and submitting your information to ASU, you consent to:</strong></p>

      <ol class="ol-list">
      	<li>
      	<div class="consent">ASU using this information to contact you regarding information as you request.</div>
      	</li>
      	<li>
      	<div class="consent">the terms of <a href="https://www.asu.edu/privacy/">ASU's Privacy Statement</a>.</div>
      	</li>
      	<li>
      	<div class="consent">If you are in the European Union or another country or state that has adopted the GDPR (General Data Protection Regulation) or similar privacy protection, please also read the <a href="https://www.asu.edu/privacy#european-union-supplement">ASU European Supplement to ASU's Privacy Statement</a>.</div>
      	</li>
      </ol>
    '#format': full_html
