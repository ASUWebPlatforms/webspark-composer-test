third_party_settings:
  feeds_tamper:
    tampers:
      6ef93d2b-a5ac-4e45-ad2b-aa689f2e608f:
        separator: ', '
        limit: null
        plugin: explode
        source: categories
        weight: 0
        label: Explode
        uuid: 6ef93d2b-a5ac-4e45-ad2b-aa689f2e608f
id: blog_posts_feed
label: 'Blog posts feed'
description: 'Feeds to import blog posts'
help: ''
import_period: -1
fetcher: upload
fetcher_configuration:
  allowed_extensions: 'txt csv tsv xml opml'
  directory: 'private://feeds'
parser: csv
parser_configuration:
  delimiter: ','
  no_headers: false
  line_limit: 100
processor: 'entity:node'
processor_configuration:
  langcode: en
  update_existing: 2
  update_non_existent: _keep
  expire: -1
  owner_feed_author: false
  owner_id: 0
  authorize: true
  skip_hash_check: false
  values:
    type: blog_posts
custom_sources:
