email_content: "<!doctype html>\r\n<html>\r\n<head>\r\n<meta charset=\"UTF-8\">\r\n<title>Untitled Document</title>\r\n</head>\r\n\r\n<body>\r\n\t<div style=\"max-width: 100%;\">\r\n\t<table  style=\"padding: 10px!important;\" ><tr><td><h1>The 5-Steps for going to College with the Right Mindset</h1><p><a href=\"#\">Download the checklist</a></p></td></tr></table>\r\n\t<div style=\"padding-left: 10px; padding-top: 2rem!important; padding-bottom: 2rem!important; background-color: #fafafa;\">\r\n\t\t<div style=\"display: flex;\"><h2>01 &nbsp;</h2><h3 style=\"margin-top:1.5rem;\">Understand the primary purpose of your GI Bill entitlement and make sure you're eligible</h3></div>\r\n\t\t<div><p>The GI Bill is a wonderful and generous benefit; however, there are two really strong messages that need to be at front of mind when thinking of using your benefit.</p></div>\r\n\t\t<hr style=\"width: 20%; height: 8px; background: #FFC627 0% 0% no-repeat padding-box; margin-left: 0px;\"/>\r\n\t\t<div class=\"container\" style=\"max-width: 800px;\">\r\n\t\t\t<div class=\"row\" style=\"display: flex; flex-wrap: wrap; margin-right: -12px; margin-left: -12px;\">\r\n\t\t\t\t<div class=\"col-md-5\" style=\"background: #ffffff; padding: 10px; border: 1px solid #D0D0D0; margin: 10px; flex: 0 0 41.6666666667%; max-width: 41.6666666667%;\">\r\n\t\t\t\t\t<p>Understand the primary purpose of your GI Bill benefit is to earn a degree and become credentialed in an industry you seek to gain employment. In other words, you should have a really good idea of what specific industry you seek to enter and a handful of job roles that seem appealing before you commit to getting a college degree</p>\r\n\t\t\t\t</div>\r\n\t\t\t\t<div class=\"col-md-5\" style=\"background: #ffffff; padding: 10px; border: 1px solid #D0D0D0; margin: 10px; flex: 0 0 41.6666666667%; max-width: 41.6666666667%;\"><p>Once you have some idea of what industry and role(s) you seek, make sure you have as an efficient-as-possible plan to get that degree so you don’t have to have it take more time and spend money out of your own pocket</p>\r\n\t\t\t\t</div>\r\n\t\t\t</div>\r\n\t\t</div>\r\n\t\t<p>Once you have these two top of mind areas covered, check out your <a href=\"https://www.va.gov/education/about-gi-bill-benefits/\">GI Bill benefit</a> and start learning what specific entitlements you'll have depending on your pathway.</p>\r\n\t\t<ul class=\"uds-list\" style=\"padding: 0 0 3rem 2rem;\"><li>Make an appointment with your local VA rep</li><li>Look at the <a href=\"https://www.va.gov/education/gi-bill-comparison-tool/\">GI Bill comparison tool</a> to get an idea of the different institutions</li>\r\n\t\t</ul>\r\n\t\t<p><p>As soon as you’ve checked out the GI Bill benefit, make sure you’re eligible for the entitlement by applying for your <a href=\"https://www.va.gov/education/gi-bill/post-9-11/ch-33-benefit/\">certificate of eligibility</a> from the VA.</p></p>\r\n  </div>\r\n  \r\n  <div style=\"padding-left: 10px; padding-top: 2rem!important; padding-bottom: 2rem!important; background-color: #ffffff;\">\r\n\t  <div style=\"display: flex;\"><h2>02 &nbsp;</h2><h3 style=\"margin-top:1.5rem;\">Understand the private sector employers are seeking a specialist</h3></div>\r\n\t  <div><p>One of the biggest challenges you’ll face as a transitioning military member are the stark differences between the public and private sectors.</p></div>\r\n\t  <hr style=\"width: 20%; height: 8px; background: #FFC627 0% 0% no-repeat padding-box; margin-left: 0px;\"/>\r\n\t  <div class=\"container\" style=\"max-width: 800px;\">\r\n\t\t\t<div class=\"row\" style=\"display: flex; flex-wrap: wrap; margin-right: -12px; margin-left: -12px;\">\r\n\t\t\t\t<div class=\"col-md-5\" style=\"background: #ffffff; padding: 10px; border: 1px solid #D0D0D0; margin: 10px; flex: 0 0 41.6666666667%; max-width: 41.6666666667%;\">\r\n\t\t\t\t\t<p>The military public sector is taxpayer funded into perpetuity—which means it’s essentially mandated to exist and have no competitors to worry about.</p>\r\n\t\t\t\t</div>\r\n\t\t\t\t<div class=\"col-md-5\" style=\"background: #ffffff; padding: 10px; border: 1px solid #D0D0D0; margin: 10px; flex: 0 0 41.6666666667%; max-width: 41.6666666667%;\"><p>Private sector companies do not have the luxury to exist and instead have to compete against other companies out there to sell their products to customers who voluntarily pay for them; this creates a lot of uncertainty within the company, which means the company has to ensure they have the right people in the right roles to address the market need; this is to say that private sector companies are seeking a credentialed individual with a specific skill set to fill a specific role.</p>\r\n\t\t\t\t</div>\r\n\t\t\t</div>\r\n\t  </div>\r\n\t  <p>This specificity is what will be a big change for you—but if you do—getting that degree to fill that specific role will set you up for success!</p>\r\n\t  <p>Your college degree is critical because it will be your credential—and more and more companies are requiring college degrees to break into that next tier of employment that pays better and provides upward mobility. This is also how job boards are set up.</p>\r\n\t  <p>Having this “insider info” will help you adjust your mindset to properly leverage your GI Bill and create a more successful outcome.</p>\r\n  </div>\r\n\t\r\n  <div style=\"padding-left: 10px; padding-top: 2rem!important; padding-bottom: 2rem!important; background-color: #fafafa;\">\t\r\n\t  <div style=\"display: flex;\"><h2>03 &nbsp;</h2><h3 style=\"margin-top:1.5rem;\">Initially, choose a primary and secondary career vector & determine what credentialing is needed</h3></div>\r\n\t  <div><p>Now that you know that getting your college degree is an integral part of the process because of the credentialing process, the next step is to choose a primary and secondary career vector.</p><p>Now, back to those likely thoughts in your head, another one will likely be, “I really want to do something completely different than what I did in the military.” And, while that thought is fine and good, consider this. Since you probably haven’t worked in the private sector before, you may be thinking that your job in the military will be exactly like a job in the private sector—this is likely not the case because they operate in completely different manners. The best way you bridge this gap is to do informational interviews with individuals in those positions of interest who are in the private sector.</p></div>\r\n\t  <hr style=\"width: 20%; height: 8px; background: #FFC627 0% 0% no-repeat padding-box; margin-left: 0px;\"/>\r\n\t  <div class=\"container\" style=\"max-width: 800x;\">\r\n\t\t\t<div class=\"row\" style=\"display: flex; flex-wrap: wrap; margin-right: -12px; margin-left: -12px;\">\r\n\t\t\t\t<div class=\"col-md-5\" style=\"background: #ffffff; padding: 10px; border: 1px solid #D0D0D0; margin: 10px; flex: 0 0 41.6666666667%; max-width: 41.6666666667%;\"><p><strong>Primary Career Vector</strong>—With that in mind, we recommend you consider keeping your primary career vector close to what you did in the military. Why? Well, because this is an area where you have deep experience, some initial credentialing (certs, etc.), so this is a area where you likely have the largest earning potential.</p></div>\r\n\t\t\t\t<div class=\"col-md-5\" style=\"background: #ffffff; padding: 10px; border: 1px solid #D0D0D0; margin: 10px; flex: 0 0 41.6666666667%; max-width: 41.6666666667%;\"><p><strong>Secondary Career Vector</strong>—if you’ve checked your assumptions on your primary career and still feel like you’d want a potential second career vector, take an inventory of other passions you have and map those to specific degrees you can gain—and more importantly, which jobs these credentials will support in helping you gain that well-paying job in the industry you want to be in.</p>\r\n\t\t\t\t</div>\r\n\t\t\t</div>\r\n\t  </div>\r\n\t</div>\t\r\n\t\r\n\t<div style=\"padding-left: 10px; padding-top: 2rem!important; padding-bottom: 2rem!important; background-color: #ffffff;\">\t\r\n\t  <div style=\"display: flex;\"><h2>04 &nbsp;</h2><h3 style=\"margin-top:1.5rem;\">Make a list of colleges that provide that specific credential</h3></div>\r\n\t  <div><p>Once you’ve identified your primary and secondary career of interest, it’s time to make a list of the top 10 colleges that provide that specific credential.</p><hr style=\"width: 20%; height: 8px; background: #FFC627 0% 0% no-repeat padding-box; margin-left: 0px;\"/><p>Did you know that most, if not all, colleges have local veteran admissions specialists that can help you?</p><p>Added bonus: if you’ve done the work up front we talk about in this checklist, you’ll have a leg up on everyone and the conversation with the specialist will be very useful and insightful to help you make the best-possible decision.</p><p>Refine your list based on what you’ve learned and pair it down to the top 5.</p></div>\r\n    </div>\r\n\t\r\n\t<div style=\"padding-left: 10px; padding-top: 2rem!important; padding-bottom: 2rem!important; background-color: #fafafa;\">\t\r\n\t  <div style=\"display: flex;\"><h2>05 &nbsp;</h2><h3 style=\"margin-top:1.5rem;\">Make your decision</h3></div>\r\n\t  <div><p>Now that you’ve methodically paired it down the top 5 schools that provide that specific credential to get you that well-paying job you’re seeking in that industry of choice, it’s time to make a choice and begin the application process.</p><hr style=\"width: 20%; height: 8px; background: #FFC627 0% 0% no-repeat padding-box; margin-left: 0px;\"/><p>It’s time to use the <a href=\"https://www.va.gov/education/gi-bill-comparison-tool/\">GI Bill comparison tool</a> to see the differences between your top 5 colleges of choice and begin the application process.</p><p>Remember, you can always get help from your local veteran admissions specialist who’s connected to your university of interest.</p></div>\r\n    </div>\t\r\n\t</div>\r\n</body>\r\n</html>\r\n"
