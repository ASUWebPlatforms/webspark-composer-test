    _controller: '\Drupal\asu_contact_webform_custom_options\Controller\ContactFormController::intl_rep_info_page'
    _title: International Reps data
  requirements:
    _permission: 'access content'

asu_contact_webform_custom_options.international_china_specialist_node_load:
  path: '/get-intl-china-rep-data/{node_id}'
  defaults:
    _controller: '\Drupal\asu_contact_webform_custom_options\Controller\ContactFormController::international_china_specialist_node_load'
    _title: International China Reps data
  requirements:
    _permission: 'access content'


asu_contact_webform_custom_options.highSchoolAutocomplete:
  path: '/admin/asu_contact_webform_custom_options/autocomplete/hs'
  defaults:
     _controller: '\Drupal\asu_contact_webform_custom_options\Controller\ContactFormController::highSchoolAutocomplete'
     _format: json
  requirements:
     _permission: 'access content'


asu_contact_webform_custom_options.transferArizonaInstitutes:
  path: '/admin/asu_contact_webform_custom_options/autocomplete/tai'
  defaults:
     _controller: '\Drupal\asu_contact_webform_custom_options\Controller\ContactFormController::ArizonaInstituteAutocomplete'
     _format: json
  requirements:
     _permission: 'access content'


asu_contact_webform_custom_options.transferCaliforniaInstitutes:
  path: '/admin/asu_webform_custom_options/autocomplete/tci'
  defaults:
     _controller: '\Drupal\asu_contact_webform_custom_options\Controller\ContactFormController::CaliforniaInstituteAutocomplete'
     _format: json
  requirements:
     _permission: 'access content'


asu_contact_webform_custom_options.asu_contact_webform_custom_options_contact_form_formnid_settings:
    path: '/admin/config/content/contact_forms/form_options'
    defaults:
      _form: '\Drupal\asu_contact_webform_custom_options\Form\ContactFormNodes'
      _title: 'Add node ids of the contact forms'
    requirements:
      _permission: 'administer asu_contact_webform_custom_options'
