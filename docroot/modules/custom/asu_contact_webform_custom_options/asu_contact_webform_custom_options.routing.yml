asu_contact_webform_custom_options.rep_info_page:
  path: '/get-rep-data/{state_selected}'
  defaults:
    _controller: '\Drupal\asu_contact_webform_custom_options\Controller\ContactFormController::rep_info_page'
    _title: Reps data
  requirements:
    _permission: 'access content'


asu_contact_webform_custom_options.rep_info_hs_page:
  path: '/get-rep-data/{state_selected}/{hs_selected}'
  defaults:
    _controller: '\Drupal\asu_contact_webform_custom_options\Controller\ContactFormController::rep_info_hs_page'
    _title: Reps data
  requirements:
    _permission: 'access content'


asu_contact_webform_custom_options.transfer_ca_az_rep_info_page:
  path: '/get-tr-ca-az-rep-data/{state_selected}/{inst_selected}'
  defaults:
    _controller: '\Drupal\asu_contact_webform_custom_options\Controller\ContactFormController::transfer_ca_az_rep_info_page'
    _title: Transfer CA Reps data
  requirements:
    _permission: 'access content'


asu_contact_webform_custom_options.transfer_other_rep_info_page:
  path: '/get-tr-rep-data/{state_selected}'
  defaults:
    _controller: '\Drupal\asu_contact_webform_custom_options\Controller\ContactFormController::transfer_other_rep_info_page'
    _title: Transfer all Reps data
  requirements:
    _permission: 'access content'


asu_contact_webform_custom_options.intl_rep_info_page:
  path: '/get-intl-rep-data/{region}/{country}'
